name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run application checks
        run: npm run check

      - name: Build deployment image
        run: docker build --tag invoice-creator:ci .

      - name: Smoke test deployment image
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name invoice-creator-ci -p 3000:3000 invoice-creator:ci
          trap 'docker logs invoice-creator-ci; docker rm -f invoice-creator-ci' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health | grep --quiet '"status":"ok"'; then
              exit 0
            fi
            sleep 1
          done

          exit 1
